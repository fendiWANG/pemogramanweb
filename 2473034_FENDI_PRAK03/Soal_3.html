<!DOCTYPE html>
<html>
<head>
<title>Form Tambah Data User</title>
</head>

<body>

<h2>Form Tambah Data User</h2>

<form>

Name :
<input type="text" name="name" required
oninvalid="this.setCustomValidity('Name is required!!!')"
oninput="this.setCustomValidity('')">
<br><br>

Address :
<input type="text" name="address" required
oninvalid="this.setCustomValidity('Address is required!!!')"
oninput="this.setCustomValidity('')">
<br><br>

Email :
<input type="email" name="email" required
oninvalid="this.setCustomValidity('Harap isi bidang ini.')"
oninput="this.setCustomValidity('')">
<br><br>

Home Page :
<input type="url" name="homepage">
<br><br>

Birthday :
<input type="date" name="birthday">
<br><br>

Favorit Color :
<input type="color" name="color">
<br><br>

IPK :
<input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
<br><br>

Phone Number :
<input type="text" name="phone"
pattern="[0-9]{3}-[0-9]{7,10}"
placeholder="###-#######">
<br><br>

<input type="submit" value="Add">

</form>

</body>
</html>
