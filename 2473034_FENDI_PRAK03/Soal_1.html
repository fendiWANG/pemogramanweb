<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
</head>

<body>

<form>
<table border="1" width="600" align="center" cellpadding="10">

    <tr>
        <th colspan="3" style="font-size:30px; background-color:lightgray;">
            Edit profile
        </th>
    </tr>

    <tr>
        <td rowspan="6" align="center" width="150">
            <img src="https://cdn.kibrispdr.org/data/214/foto-orang-orang-1.jpg" width="120"><br><br>
            <input type="file"><br><br>
            <input type="button" value="Upload">
        </td>
    </tr>

    <tr>
        <td>Name</td>
        <td>
            <input type="text" value="Tim Berners-Lee">
        </td>
    </tr>

    <tr>
        <td>Position</td>
        <td>
            <select>
                <optgroup label="Programmer">
                    <option>Senior Programmer</option>
                    <option>Junior Programmer</option>
                </optgroup>

                <optgroup label="System Analyst">
                    <option>Senior Analyst</option>
                    <option>Junior Analyst</option>
                </optgroup>
            </select>
        </td>
    </tr>

    <tr>
        <td>Password</td>
        <td>
            <input type="password" value="admin">
        </td>
    </tr>

    <tr>
        <td>Confirm Password</td>
        <td>
            <input type="password" value="admin">
        </td>
    </tr>

    <tr>
        <td colspan="2" align="right">
            <input type="reset" value="Reset">
            <input type="submit" value="Update">
        </td>
    </tr>

</table>
</form>

</body>
</html>
