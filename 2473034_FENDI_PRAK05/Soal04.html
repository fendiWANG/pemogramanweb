<!DOCTYPE html>
<html>
<head>
<title>Navbar</title>

<style>

body {
    background: #ddd;
    font-family: Arial;
}

.navbar {
    width: 1000px;
    margin: 60px auto;
    background: #b30000;
}

.navbar ul {
    list-style: none;
    margin: 0;
    padding: 0;
}

.navbar ul li {
    float: left;
    width: 200px;
    height: 110px;
    color: white;
    box-sizing: border-box;

    padding: 15px 20px;

    border-right: 2px solid white;
    position: relative;
}

.navbar ul li::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 15px;
    width: 5px;
    height: 70px;
    background: yellow;
}

.navbar ul li:last-child {
    border-right: none;
}

.navbar ul li h1 {
    margin: 0;
    font-size: 50px;
    font-weight: bold;
}

.navbar ul li p {
    margin: 5px 0 0;
    font-weight: bold;
    letter-spacing: 1px;
}

.clear {
    clear: both;
}

</style>
</head>

<body>

<div class="navbar">
    <ul>
        <li>
            <h1>01</h1>
            <p>ABOUT SHOP</p>
        </li>

        <li>
            <h1>02</h1>
            <p>GALLERY</p>
        </li>

        <li>
            <h1>03</h1>
            <p>FREE MUSIC</p>
        </li>

        <li>
            <h1>04</h1>
            <p>ARTIST</p>
        </li>

        <li>
            <h1>05</h1>
            <p>CONTACTS</p>
        </li>
    </ul>

    <div class="clear"></div>
</div>

</body>
</html>
