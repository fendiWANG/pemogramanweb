<!DOCTYPE html>
<html>
<head>
<title>Layout Fix Rapi</title>
<style>

body {
    background: #ddd;
}

/* MERAH */
.header {
    width: 950px;
    height: 80px;
    background: red;
    margin-top: 40px;
    margin-bottom: 20px; /* jarak ke bawah */
}

/* BIRU */
.left {
    width: 180px;
    height: 200px;
    background: blue;
    float: left;
}

/* HIJAU */
.content {
    width: 720px; /* 🔥 DIKECILIN biar ga turun */
    height: 300px;
    background: green;
    float: left;
    margin-left: 20px; /* jarak dari biru */
    padding: 20px;
    box-sizing: border-box;
}

/* KUNING */
.right-inside {
    width: 200px;
    height: 180px;
    background: yellow;
    float: right;
    margin: 10px;
}

/* CLEAR */
.clear {
    clear: both;
}

</style>
</head>
<body>

<div class="header"></div>

<div class="left"></div>

<div class="content">

    <div class="right-inside"></div>

    content content content content content content content
    content content content content content content content
    content content content content content content content
    content content content content content content content

</div>

<div class="clear"></div>

</body>
</html>
