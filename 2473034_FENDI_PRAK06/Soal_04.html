<!DOCTYPE html>
<html>
<head>
<title>Number Conversion</title>

<style>
body{
    font-family: Arial;
}

.container{
    width: 350px;
    margin: 50px auto;
    padding: 15px;
    border: 2px solid #999;
    box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
}

input, select{
    width: 100%;
    margin: 5px 0;
    padding: 5px;
}

button{
    margin: 5px;
    padding: 5px 10px;
}
</style>

</head>
<body>

<div class="container">

<label>Input :</label>
<input type="text" id="input">

<label>Output :</label>
<input type="text" id="output" readonly>

<select id="mode">
    <option value="dec2bin">decimal-biner</option>
    <option value="bin2dec">biner-decimal</option>
</select>

<br>

<button onclick="proses()">PROSES</button>
<button onclick="resetForm()">RESET</button>

</div>

<script>

function proses(){

    var input = document.getElementById("input").value;
    var mode = document.getElementById("mode").value;

    // ================= DECIMAL → BINER =================
    if(mode === "dec2bin"){

        if(isNaN(input) || input === ""){
            alert("Input harus angka!");
            return;
        }

        var num = parseInt(input);

        if(num < 0 || num > 255){
            alert("Harus 0 - 255!");
            return;
        }

        var hasil = "";

        // manual konversi
        while(num > 0){
            hasil = (num % 2) + hasil;
            num = Math.floor(num / 2);
        }

        // biar 8 digit
        while(hasil.length < 8){
            hasil = "0" + hasil;
        }

        document.getElementById("output").value = hasil;
    }

    // ================= BINER → DECIMAL =================
    else{

        if(input.length != 8){
            alert("Harus 8 digit!");
            return;
        }

        for(var i=0; i<input.length; i++){
            if(input[i] !== "0" && input[i] !== "1"){
                alert("Hanya boleh 0 dan 1!");
                return;
            }
        }

        var hasil = 0;

        // manual konversi
        for(var i=0; i<8; i++){
            hasil += parseInt(input[i]) * Math.pow(2, 7 - i);
        }

        document.getElementById("output").value = hasil;
    }
}

function resetForm(){
    document.getElementById("input").value = "";
    document.getElementById("output").value = "";
}

</script>

</body>
</html>
